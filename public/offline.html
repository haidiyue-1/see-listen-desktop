<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记本离线中 - See Listen</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #f472b6;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2.5rem;
      border-radius: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      max-width: 420px;
      width: 90%;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pet-avatar {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(244, 114, 182, 0.1);
      border-radius: 50%;
      border: 2px dashed var(--accent);
      padding: 8px;
    }

    .pet-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: 0.5px;
    }

    p {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(244, 63, 94, 0.15);
      color: #fb7185;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid rgba(244, 63, 94, 0.25);
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #f43f5e;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 引入离线的爱弥斯动图 (加载自项目CDN或保留图) -->
    <div class="pet-avatar">
      <img src="https://music.iuno42.site/boring.gif" onerror="this.src='https://picsum.photos/100/100'" alt="Offline Pet">
    </div>
    
    <h1>笔记本未开机</h1>
    <p>爱弥斯正在闭目养神...<br>请确认您的笔记本已开机，并且已经双击运行了「启动.bat」服务。</p>
    
    <div class="status-badge">
      <span class="pulse-dot"></span> 桥接服务离线中
    </div>
  </div>

</body>
</html>
